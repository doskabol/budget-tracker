<div class="container" style="display: flex; flex-direction: column; justify-content: center; min-height: 100vh;">
    <div class="card" style="text-align: center;">
      <div style="font-size: 48px; margin-bottom: 16px;">💰</div>
      <h1 style="margin-bottom: 32px;">Budget Tracker</h1>
      
      <form (ngSubmit)="onSubmit()">
        <input type="text" [(ngModel)]="username" name="username" placeholder="Логин" style="width: 100%; padding: 14px; border: 1px solid #e9ecef; border-radius: 14px; margin-bottom: 12px; font-size: 16px;">
        <input type="password" [(ngModel)]="password" name="password" placeholder="Пароль" style="width: 100%; padding: 14px; border: 1px solid #e9ecef; border-radius: 14px; margin-bottom: 20px; font-size: 16px;">
        <button type="submit" class="btn-primary">Войти</button>
      </form>
      
      <p *ngIf="error" style="color: #ff3b30; margin-top: 16px;">{{ error }}</p>
      <a routerLink="/register" style="display: block; margin-top: 20px; color: #007aff; text-decoration: none;">Нет аккаунта? Зарегистрироваться</a>
    </div>
  </div>
