<div class="auth-container">
    <div class="auth-card">
      <h2>Вход в Budget Tracker</h2>
      <form (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label>Имя пользователя</label>
          <input type="text" [(ngModel)]="username" name="username" required class="form-control">
        </div>
        <div class="form-group">
          <label>Пароль</label>
          <input type="password" [(ngModel)]="password" name="password" required class="form-control">
        </div>
        <button type="submit" class="btn-primary">Войти</button>
        <p class="register-link">Нет аккаунта? <a routerLink="/register">Зарегистрироваться</a></p>
      </form>
      <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
    </div>
  </div>
