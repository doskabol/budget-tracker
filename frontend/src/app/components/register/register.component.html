<div class="container">
    <h2>Регистрация</h2>
    <form (ngSubmit)="onSubmit()">
      <input type="text" [(ngModel)]="username" name="username" placeholder="Логин" required>
      <input type="email" [(ngModel)]="email" name="email" placeholder="Email">
      <input type="password" [(ngModel)]="password" name="password" placeholder="Пароль" required>
      <button type="submit">Зарегистрироваться</button>
    </form>
    <p *ngIf="error" class="error">{{ error }}</p>
    <a routerLink="/login">Уже есть аккаунт? Войти</a>
  </div>
