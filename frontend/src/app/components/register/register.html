<div class="auth-container">
    <div class="auth-card">
      <h2>Регистрация</h2>
      <form (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label>Имя пользователя</label>
          <input type="text" [(ngModel)]="username" name="username" required class="form-control">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="email" name="email" required class="form-control">
        </div>
        <div class="form-group">
          <label>Пароль</label>
          <input type="password" [(ngModel)]="password" name="password" required class="form-control">
        </div>
        <div class="form-group">
          <label>Подтвердите пароль</label>
          <input type="password" [(ngModel)]="password2" name="password2" required class="form-control">
        </div>
        <button type="submit" class="btn-primary">Зарегистрироваться</button>
        <p class="register-link">Уже есть аккаунт? <a routerLink="/login">Войти</a></p>
      </form>
      <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
    </div>
  </div>
