<div class="navbar">
  <a routerLink="/dashboard" routerLinkActive="active">
    <i class="fas fa-home"></i>
    <span>Главная</span>
  </a>
  <a routerLink="/transactions" routerLinkActive="active">
    <i class="fas fa-history"></i>
    <span>История</span>
  </a>
  <a routerLink="/categories" routerLinkActive="active">
    <i class="fas fa-folder"></i>
    <span>Категории</span>
  </a>
  <a routerLink="/saving-goals" routerLinkActive="active">
    <i class="fas fa-bullseye"></i>
    <span>Цели</span>
  </a>
  <a routerLink="/debts" routerLinkActive="active">
    <i class="fas fa-hand-holding-usd"></i>
    <span>Долги</span>
  </a>
  <button (click)="logout()" class="logout-btn">
    <i class="fas fa-sign-out-alt"></i>
    <span>Выйти</span>
  </button>
</div>

<div class="container">
  <h1 style="margin-bottom: 24px;">
    <i class="fas fa-exchange-alt"></i> Долги
  </h1>

  <!-- Форма добавления долга -->
  <div class="card">
    <h3 style="margin-bottom: 16px;">
      <i class="fas fa-plus-circle"></i> Добавить долг
    </h3>
    
    <input type="text" [(ngModel)]="newDebt.name" placeholder="Кому / кому должен" class="input-field">
    
    <input type="number" [(ngModel)]="newDebt.amount" placeholder="Сумма" class="input-field">
    
    <select [(ngModel)]="newDebt.direction" class="input-field">
      <option value="i_owe">📤 Я должен</option>
      <option value="owe_me">📥 Мне должны</option>
    </select>
    
    <input type="date" [(ngModel)]="newDebt.due_date" class="input-field">
    
    <label style="display: flex; align-items: center; gap: 8px; margin: 12px 0; cursor: pointer;">
      <input type="checkbox" [(ngModel)]="newDebt.is_paid">
      
    </label>
    
    <button class="btn-primary" (click)="addDebt()">
      <i class="fas fa-save"></i> Добавить долг
    </button>
  </div>

  <!-- Я должен -->
  <div class="card">
    <h3 style="margin-bottom: 16px; color: #ff3b30;">
      <i class="fas fa-arrow-up"></i> Я должен
    </h3>
    <div *ngIf="debtsOwe.length === 0" style="color: #8e8e93; text-align: center; padding: 20px;">
      Нет долгов
    </div>
    <div *ngFor="let debt of debtsOwe" class="debt-item">
      <div>
        <div class="debt-name">{{ debt.name }}</div>
        <div class="debt-date" *ngIf="debt.due_date">
          <i class="far fa-calendar-alt"></i> до {{ debt.due_date }}
        </div>
      </div>
      <div>
        <div class="debt-amount negative">{{ debt.amount }} ₸</div>
        <div class="debt-status" *ngIf="debt.is_paid">✅ Возвращено</div>
      </div>
      <button class="delete-btn" (click)="deleteDebt(debt.id!)">
        <i class="fas fa-trash-alt"></i>
      </button>
    </div>
  </div>

  <!-- Мне должны -->
  <div class="card">
    <h3 style="margin-bottom: 16px; color: #34c759;">
      <i class="fas fa-arrow-down"></i> Мне должны
    </h3>
    <div *ngIf="debtsOweMe.length === 0" style="color: #8e8e93; text-align: center; padding: 20px;">
      Нет долгов
    </div>
    <div *ngFor="let debt of debtsOweMe" class="debt-item">
      <div>
        <div class="debt-name">{{ debt.name }}</div>
        <div class="debt-date" *ngIf="debt.due_date">
          <i class="far fa-calendar-alt"></i> до {{ debt.due_date }}
        </div>
      </div>
      <div>
        <div class="debt-amount positive">{{ debt.amount }} ₸</div>
        <div class="debt-status" *ngIf="debt.is_paid">✅ Получено</div>
      </div>
      <button class="delete-btn" (click)="deleteDebt(debt.id!)">
        <i class="fas fa-trash-alt"></i>
      </button>
    </div>
  </div>
</div>
