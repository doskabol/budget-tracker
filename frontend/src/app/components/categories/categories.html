<div class="categories-container">
    <div class="page-header">
      <div class="header-icon">
        <i class="fas fa-tags"></i>
      </div>
      <div class="header-text">
        <h1>Категории</h1>
        <p>Управляйте своими категориями доходов и расходов</p>
      </div>
    </div>
  
    <!-- Форма добавления категории -->
    <div class="add-category-card">
      <h3>
        <i class="fas fa-plus-circle"></i>
        Добавить новую категорию
      </h3>
      <div class="add-category-form">
        <div class="form-group">
          <label>
            <i class="fas fa-font"></i>
            Название категории
          </label>
          <input 
            type="text" 
            [(ngModel)]="newCategoryName" 
            placeholder="Например: Такси, Рестораны, Фриланс..."
            class="form-control"
          >
        </div>
        
        <div class="form-group">
          <label>
            <i class="fas fa-chart-line"></i>
            Тип категории
          </label>
          <select [(ngModel)]="newCategoryType" class="form-control">
            <option value="expense">📉 Расход</option>
            <option value="income">📈 Доход</option>
          </select>
        </div>
        
        <button (click)="addCategory()" class="btn-add">
          <i class="fas fa-plus"></i>
          Добавить категорию
        </button>
      </div>
    </div>
  
    <!-- Список категорий -->
    <div class="categories-section">
      <div class="section-header">
        <h3>
          <i class="fas fa-list"></i>
          Мои категории
        </h3>
        <span class="categories-count">{{ categories.length }} категорий</span>
      </div>
  
      <div class="categories-grid">
        <div *ngFor="let cat of categories" class="category-card">
          <div class="category-icon" [style.background]="cat.color">
            <i class="fas" [class.fa-arrow-up]="cat.type === 'income'" [class.fa-arrow-down]="cat.type === 'expense'"></i>
          </div>
          <div class="category-info">
            <h4>{{ cat.name }}</h4>
            <span class="category-badge" [class.income-badge]="cat.type === 'income'" [class.expense-badge]="cat.type === 'expense'">
              <i class="fas" [class.fa-arrow-up]="cat.type === 'income'" [class.fa-arrow-down]="cat.type === 'expense'"></i>
              {{ cat.type === 'income' ? 'Доход' : 'Расход' }}
            </span>
          </div>
          <button class="category-edit" (click)="editCategory(cat)">
            <i class="fas fa-edit"></i>
          </button>
          <button class="category-delete" (click)="deleteCategory(cat.id)">
            <i class="fas fa-trash"></i>
          </button>
        </div>
      </div>
  
      <!-- Пустое состояние -->
      <div *ngIf="categories.length === 0" class="empty-state">
        <i class="fas fa-folder-open"></i>
        <p>У вас пока нет категорий</p>
        <p class="empty-hint">Добавьте первую категорию выше</p>
      </div>
    </div>
  </div>
